<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Form - CRM System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased">

  <div class="flex flex-col md:flex-row min-h-screen">
    
    <aside class="w-full md:w-64 bg-slate-900 text-slate-300 border-b md:border-b-0 md:border-r border-slate-800 flex-shrink-0 md:sticky md:top-0 md:h-screen flex flex-col">
      <div class="p-6 flex items-center gap-4 border-b border-slate-800">
        <div class="w-10 h-10 flex-shrink-0 bg-blue-500 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-500/20">
          C
        </div>
        <div>
          <h1 class="font-bold text-white text-lg leading-tight">CRM System</h1>
          <p class="text-xs text-slate-400 mt-0.5">Small Business<br>Manager</p>
        </div>
      </div>

      <nav class="flex-1 p-4 space-y-2 overflow-y-auto mt-2">
        <a href="dashboard.html" class="block px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
          Dashboard
        </a>
        <a href="customers.html" class="block px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
          Customers
        </a>
        <a href="customer-form.html" class="block px-4 py-3 text-sm font-medium text-white bg-slate-800/80 border border-slate-700/50 shadow-sm rounded-lg transition-colors">
          Add Customer
        </a>
        <a href="tasks.html" class="block px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
          Tasks
        </a>
      </nav>
      
      <div class="p-4 mt-auto mb-4">
        <a href="index.html" class="block px-4 py-3 text-sm font-medium text-slate-400 hover:text-rose-400 hover:bg-slate-800 rounded-lg transition-colors">
          Logout
        </a>
      </div>
    </aside>

    <main class="flex-1 p-4 md:p-8 lg:p-10 overflow-y-auto w-full max-w-4xl mx-auto">
      
      <header class="mb-8 border-b border-slate-200 pb-6">
        <h2 id="formTitle" class="text-3xl font-bold text-slate-800">Add Customer</h2>
        <p id="formSubtitle" class="text-slate-500 text-sm mt-2">Create a new customer record in the CRM system.</p>
      </header>

      <section class="mb-6">
        <a href="customers.html" class="inline-flex items-center text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg px-4 py-2 shadow-sm hover:bg-slate-50 hover:text-slate-900 transition-all">
          <span class="mr-2">&larr;</span> Back to Customers
        </a>
      </section>

      <section class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-8">
        
        <div class="px-6 py-5 border-b border-slate-100 bg-slate-50/50">
          <h2 class="text-lg font-semibold text-slate-800">Customer Information</h2>
          <p class="text-sm text-slate-500 mt-1">Fill in the form below and save the customer record.</p>
        </div>

        <div class="p-6 md:p-8">
          <form id="customerForm" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              
              <div>
                <label for="full_name" class="block text-sm font-semibold text-slate-700 mb-1.5">Full Name <span class="text-rose-500">*</span></label>
                <input type="text" id="full_name" required
                  class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                  placeholder="e.g. Nguyen Van A" />
              </div>

              <div>
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">Email Address <span class="text-rose-500">*</span></label>
                <input type="email" id="email" required
                  class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                  placeholder="nguyenvana@example.com" />
              </div>

              <div>
                <label for="phone" class="block text-sm font-semibold text-slate-700 mb-1.5">Phone Number</label>
                <input type="tel" id="phone"
                  class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                  placeholder="0987 654 321" />
              </div>

              <div>
                <label for="source" class="block text-sm font-semibold text-slate-700 mb-1.5">Lead Source</label>
                <select id="source" 
                  class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-900 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all cursor-pointer">
                  <option value="">Select source</option>
                  <option value="Facebook Ads">Facebook Ads</option>
                  <option value="Website Form">Website Form</option>
                  <option value="Zalo">Zalo</option>
                  <option value="Email Campaign">Email Campaign</option>
                  <option value="Referral">Referral</option>
                  <option value="Walk-in">Walk-in</option>
                </select>
              </div>

              <div>
                <label for="last_contact" class="block text-sm font-semibold text-slate-700 mb-1.5">Last Contact Date</label>
                <input type="date" id="last_contact"
                  class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all cursor-pointer" />
              </div>

              <div>
                <label for="next_follow_up" class="block text-sm font-semibold text-slate-700 mb-1.5">Next Follow-up Date</label>
                <input type="date" id="next_follow_up"
                  class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all cursor-pointer" />
              </div>
              
            </div>

            <hr class="border-slate-200 mt-8 mb-6">

            <div class="flex items-center justify-end gap-4">
              <p id="customerFormMessage" class="text-sm font-medium hidden text-amber-600 mr-auto"></p>
              
              <a href="customers.html" class="text-sm font-semibold text-slate-600 hover:text-slate-900 transition-colors">
                Cancel
              </a>
              <button type="submit" id="saveCustomerBtn" class="bg-blue-600 text-white font-semibold text-sm px-6 py-2.5 rounded-lg shadow-sm hover:bg-blue-700 hover:-translate-y-0.5 transition-all">
                Save Customer
              </button>
            </div>
            
          </form>
        </div>
      </section>

    </main>
  </div>

  <script src="js/main.js"></script>
  <script src="js/customer-form.js"></script>
</body>
</html>
